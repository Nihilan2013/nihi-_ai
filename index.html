<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>NihiMIND | Smart AI Assistant</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0f172a;
        font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 16px;
    }

    .container {
        width: 500px;
        max-width: 100%;
        height: 700px;
        max-height: 90vh;
        background: #1e293b;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
    }

    .header {
        background: #2563eb;
        color: white;
        text-align: center;
        padding: 20px 16px;
    }

    .header h1 {
        font-size: 1.7rem;
        letter-spacing: -0.3px;
    }

    .header p {
        font-size: 0.85rem;
        opacity: 0.9;
        margin-top: 6px;
    }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #0f172a;
        scroll-behavior: smooth;
    }

    .message {
        padding: 12px 16px;
        border-radius: 22px;
        max-width: 85%;
        line-height: 1.45;
        font-size: 0.95rem;
        word-break: break-word;
        animation: fadeSlideUp 0.2s ease;
    }

    @keyframes fadeSlideUp {
        from {
            opacity: 0;
            transform: translateY(8px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .user {
        background: #2563eb;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 5px;
    }

    .ai {
        background: #334155;
        color: #f1f5f9;
        align-self: flex-start;
        border-bottom-left-radius: 5px;
    }

    .input-area {
        display: flex;
        padding: 14px 16px;
        background: #1e293b;
        border-top: 1px solid #334155;
        gap: 12px;
    }

    input {
        flex: 1;
        padding: 12px 18px;
        border: none;
        border-radius: 40px;
        background: #0f172a;
        color: white;
        font-size: 0.95rem;
        outline: none;
        border: 1px solid #334155;
    }

    input:focus {
        border-color: #3b82f6;
        background: #1e293b;
    }

    button {
        background: #2563eb;
        border: none;
        padding: 10px 20px;
        border-radius: 40px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #1d4ed8;
        transform: scale(0.97);
    }

    .typing-indicator {
        background: #334155;
        color: #cbd5e1;
        padding: 10px 18px;
        border-radius: 24px;
        font-size: 0.85rem;
        align-self: flex-start;
        display: flex;
        gap: 6px;
    }

    .dot-floating {
        display: inline-flex;
        gap: 4px;
    }
    
    .dot-floating span {
        width: 8px;
        height: 8px;
        background: #94a3b8;
        border-radius: 50%;
        display: inline-block;
        animation: wave 1.2s infinite ease-in-out;
    }
    
    .dot-floating span:nth-child(2) { animation-delay: 0.2s; }
    .dot-floating span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes wave {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
        30% { transform: translateY(-5px); opacity: 1; }
    }

    .footer-note {
        font-size: 10px;
        text-align: center;
        padding: 6px;
        color: #64748b;
        background: #0f172a;
    }
    
    .chat-box::-webkit-scrollbar {
        width: 5px;
    }
    
    .chat-box::-webkit-scrollbar-track {
        background: #1e293b;
    }
    
    .chat-box::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🧠 Nihi AI</h1>
        <p>Smart Knowledge Assistant | Ask anything</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai">
            ✨ Hello! I'm Nihi AI. Ask me about tech, geography, science, history, health, sports, and much more.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask a question... (e.g., what is AI, capital of India)" autocomplete="off">
        <button id="sendBtn">📨 Send</button>
    </div>
    <div class="footer-note">
        💡 Try: "who is abdul kalam", "what is blockchain", "capital of Tamil Nadu", "what is html"
    </div>
</div>

<script>
    const knowledge = {
        "hello": "Hello 👋 How can I help you?",
        "hi": "Hi 👋 Welcome to Nihi AI.",
        "how are you": "I am fine 🚀 Ready to answer your queries!",
        "your name": "My name is Nihi AI. I'm your smart assistant.",
        "who made you": "I was crafted with HTML, CSS, and JavaScript by a creative developer.",

        "what is css": "CSS (Cascading Style Sheets) designs and styles websites.",
        "what is javascript": "JavaScript makes websites interactive and dynamic.",

        "what is c++": "C++ is a powerful language for system/software development and games.",
        "what is coding": "Coding means writing instructions that computers execute.",

        "what is blockchain": "Blockchain securely stores digital records in a decentralized chain.",
        "what is cloud computing": "Cloud computing delivers computing services over the internet.",
        "what is cybersecurity": "Cybersecurity protects systems from digital attacks.",
        "what is chatbot": "Chatbot is an AI program that talks with users automatically.",
        "what is virtual reality": "VR creates immersive digital worlds.",
        "what is metaverse": "Metaverse is a collective virtual shared space.",
        "who is abdul kalam": "Dr. A.P.J. Abdul Kalam was a great scientist and former President of India.",
        "president of india": "Droupadi Murmu is the President of India.",
        "prime minister of india": "Narendra Modi is the Prime Minister of India.",
        "who is virat kohli": "Virat Kohli is an Indian cricketer and former captain.",
        "who is ms dhoni": "MS Dhoni is former Indian cricket captain, known for his calm leadership.",
        "who is sachin tendulkar": "Sachin Tendulkar is the 'God of Cricket', legendary batsman.",
        "what is india": "India is a country in South Asia, known for its diversity.",
        "capital of india": "New Delhi is the capital of India.",
        "what is usa": "USA is a country in North America.",
        "capital of usa": "Washington D.C. is capital of USA.",
        "president of usa": "Joe Biden is the current President of USA.",
        "what is china": "China is a country in East Asia.",
        "capital of china": "Beijing is the capital of China.",
        "what is japan": "Japan is an island country in East Asia.",
        "capital of japan": "Tokyo is the capital of Japan.",
        "what is russia": "Russia is the largest country in the world.",
        "capital of russia": "Moscow is the capital of Russia.",
        "what is france": "France is a European country famous for art and culture.",
        "capital of france": "Paris is the capital of France.",
        "what is germany": "Germany is a European economic powerhouse.",
        "capital of germany": "Berlin is the capital of Germany.",
        "what is canada": "Canada is a North American country with vast landscapes.",
        "capital of canada": "Ottawa is the capital of Canada.",
        "what is australia": "Australia is both a country and a continent.",
        "capital of australia": "Canberra is the capital of Australia.",
        "capital of tamil nadu": "Chennai is the capital of Tamil Nadu.",
        "chief minister of tamil nadu": "M. K. Stalin is the Chief Minister of Tamil Nadu.",
        "capital of kerala": "Thiruvananthapuram is capital of Kerala.",

        "capital of andhra pradesh": "Amaravati is capital of Andhra Pradesh.",
        "capital of telangana": "Hyderabad is capital of Telangana.",

        "what is chennai": "Chennai is the capital city of Tamil Nadu, known as Detroit of India.",
        "what is delhi": "Delhi is the capital territory of India.",
        "what is taj mahal": "Taj Mahal is a white marble mausoleum in Agra, India, symbol of love.",

        "what is statue of liberty": "Statue of Liberty is a colossal monument in New York, USA.",
        "what is great wall of china": "Great Wall of China is ancient fortification stretching thousands of miles.",
        "what is burj khalifa": "Burj Khalifa in Dubai is the tallest building in the world.",
        "what is mount everest": "Mount Everest is Earth's highest mountain, part of Himalayas.",
        "what is earth": "Earth is our home planet, the third from the Sun.",
        "what is moon": "The Moon is Earth's natural satellite.",
        "what is sun": "The Sun is a star at the center of our solar system.",
        "what is gravity": "Gravity is a force that pulls objects toward each other.",
        "speed of light": "Light speed is approx 299,792 km per second in vacuum.",
        "first man on moon": "Neil Armstrong was the first person to walk on the Moon in 1969.",
        "largest planet": "Jupiter is the largest planet in our solar system.",
        "red planet": "Mars is called the Red Planet due to iron oxide.",
        "what is cricket": "Cricket is a bat-and-ball sport played internationally.",
        "what is football": "Football (soccer) is the world's most popular team sport.",
        "what is olympics": "Olympics is the world's foremost international sports event.",

        "benefits of exercise": "Exercise boosts heart health, mood, and energy levels.",
        "what is balanced diet": "Balanced diet includes proper amounts of carbs, proteins, fats, vitamins.",
        "what is internet": "Internet is a global network connecting billions of devices.",
        "what is computer": "Computer is an electronic device that processes data.",
        "what is software": "Software is a set of instructions that tell a computer what to do.",
        "what is hardware": "Hardware refers to physical components of a computer.",
        "what is programming": "Programming is creating instructions for computers to follow.",
        "what is nft": "NFT is a unique digital asset representing ownership.",
        "what is cryptocurrency": "Cryptocurrency is digital or virtual currency secured by cryptography.",
        "what is climate change": "Climate change refers to long-term shifts in temperatures and weather patterns.",
        "what is democracy": "Democracy is a system where people elect their leaders.",
        "what is economy": "Economy is the system of production, distribution, and consumption of goods.",
        "largest country": "Russia is the largest country by land area.",
        "smallest country": "Vatican City is the smallest independent state.",
        "longest river": "Nile River is often considered the longest river.",
        "founder of microsoft": "Bill Gates and Paul Allen founded Microsoft.",
        "founder of apple": "Steve Jobs, Steve Wozniak, and Ronald Wayne founded Apple.",
        "who invented telephone": "Alexander Graham Bell invented the telephone.",
        "who invented bulb": "Thomas Edison invented the practical electric light bulb.",
        "what is wifi": "Wi-Fi is wireless technology for internet connection.",
        "what is 5g": "5G is the fifth generation mobile network with high speed.",
        "what is ram": "RAM is temporary memory that stores active data.",
        "what is cpu": "CPU (Central Processing Unit) is the brain of the computer.",
        "what is vaccine": "Vaccine helps build immunity against diseases.",
        "what is diabetes": "Diabetes is a chronic condition affecting blood sugar.",
        "importance of water": "Water is essential for hydration, digestion, and temperature regulation.",
        "what is frontend": "Frontend is the visible part of a website users interact with.",
        "what is backend": "Backend handles server logic and database operations.",
        "what is react": "React is a JavaScript library for building user interfaces.",
        "what is github": "GitHub is a platform for version control and collaboration.",
        "what is api": "API allows different software applications to communicate.",
        "what is photoshop": "Photoshop is image editing software by Adobe.",
        "what is android": "Android is a mobile operating system by Google.",
        "what is ios": "iOS is Apple's mobile operating system for iPhone.",
        "what is electric car": "Electric car runs on electric motor and battery.",
        "what is renewable energy": "Renewable energy comes from natural sources like sun, wind.",
        "what is global warming": "Global warming is the long-term heating of Earth's climate.",
        "what is meditation": "Meditation is a practice to train attention and awareness.",
        "what is time management": "Time management is organizing time effectively to boost productivity.",
        "what is teamwork": "Teamwork means working collaboratively towards common goals.",
        "president of russia": "Vladimir Putin is President of Russia."
    };
    
    function getAnswer(question) {
        let normalized = question.trim().toLowerCase().replace(/\s+/g, ' ');
        
        if (knowledge[normalized]) {
            return knowledge[normalized];
        }
        
        const clean = normalized.replace(/[?,.!]$/, '');
        if (knowledge[clean]) return knowledge[clean];
        
        if (normalized.startsWith("what is ")) {
            const term = normalized.slice(8);
            if (term.length > 2) {
                return `📚 ${term.charAt(0).toUpperCase() + term.slice(1)}: I'm still learning about this. Try asking 'what is AI' or 'what is html' for examples!`;
            }
        }
        
        if (normalized.startsWith("capital of ")) {
            const country = normalized.slice(11);
            const capitalAnswer = knowledge[`capital of ${country}`];
            if (capitalAnswer) return capitalAnswer;
            return `The capital of ${country.toUpperCase()} is not in my knowledge base yet.`;
        }
        
        if (normalized.startsWith("president of ")) {
            const nation = normalized.slice(13);
            const ans = knowledge[`president of ${nation}`];
            if (ans) return ans;
            return `I don't have president information for ${nation} right now.`;
        }
        
        if (normalized.startsWith("prime minister of ")) {
            const nation = normalized.slice(18);
            const ans = knowledge[`prime minister of ${nation}`];
            if (ans) return ans;
            return `Prime minister data for ${nation} is not stored yet.`;
        }
        
        if (normalized.startsWith("who is ")) {
            const person = normalized.slice(7);
            const match = knowledge[`who is ${person}`];
            if (match) return match;
            return `I don't have detailed info about '${person}' yet.`;
        }
        
        return "🤖 Hmm, I don't have that exact answer yet. Try asking 'what is html', 'capital of India', or 'who is abdul kalam'! 🌟";
    }
    
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    
    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerHTML = text.replace(/\n/g, '<br>');
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    function showTypingIndicator() {
        const existingIndicator = document.querySelector('.typing-indicator');
        if (existingIndicator) existingIndicator.remove();
        const indicatorDiv = document.createElement('div');
        indicatorDiv.className = 'typing-indicator';
        indicatorDiv.innerHTML = `Nihi AI <div class="dot-floating"><span>.</span><span>.</span><span>.</span></div>`;
        chatBox.appendChild(indicatorDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return indicatorDiv;
    }
    
    function removeTypingIndicator() {
        const indicator = document.querySelector('.typing-indicator');
        if (indicator) indicator.remove();
    }
    
    async function askAI(questionText) {
        if (!questionText || questionText.trim() === "") return;
        
        userInput.disabled = true;
        sendBtn.disabled = true;
        
        addMessage(questionText, 'user');
        userInput.value = '';
        
        showTypingIndicator();
        await new Promise(resolve => setTimeout(resolve, 400));
        
        let rawAnswer = getAnswer(questionText);
        removeTypingIndicator();
        addMessage(rawAnswer, 'ai');
        
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }
    
    function handleSend() {
        const query = userInput.value.trim();
        if (query === "") {
            userInput.style.border = "1px solid #ef4444";
            setTimeout(() => userInput.style.border = "", 800);
            return;
        }
        askAI(query);
    }
    
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    window.addEventListener('DOMContentLoaded', () => {
        userInput.focus();
        console.log("✅ Nihi AI loaded with " + Object.keys(knowledge).length + " Q&A pairs!");
    });
</script>
</body>
</html>
